name: Create rfsuite-lua-ethos-lite ZIP on Push

on:
  push:
    branches:
      - 'main'
      - 'RF-*'

jobs:
  create-zip:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ←—— add locales here as translations land
        lang: [en]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set build variables (commit-based version)
        id: buildvars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "GIT_VER=commit-${SHORT_SHA}" >> $GITHUB_ENV
          echo "sha7=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create rotorflight-lua-ethos-suite-lite-<lang>-commit-<sha7>.zip
        shell: bash
        run: |
          ART="rotorflight-lua-ethos-suite-lite-${{ matrix.lang }}-${{ env.GIT_VER }}.zip"
          python bin/package/build_package.py \
            --lang '${{ matrix.lang }}' \
            --artifact-version '${{ env.GIT_VER }}' \
            --artifact-name "$ART" \
            --output-dir .
          echo "ARTIFACT=$ART" >> $GITHUB_ENV

      - name: Validate ETHOS package manifest
        shell: bash
        run: |
          python bin/package/validate_ethos_manifest_zip.py "${{ env.ARTIFACT }}"

      - name: Upload per-locale artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotorflight-lua-ethos-suite-lite-${{ matrix.lang }}-${{ env.GIT_VER }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
